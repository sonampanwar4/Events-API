name: Events-API CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Docker buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image
        run: |
          docker build -t events-api:latest .

      - name: Run Docker Container
        run: |
          docker run -d -p 5001:5001 --name events-api-container events-api:latest
          sleep 5
          curl http://localhost:5001/api/health || exit 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python Dependencies
        run: |
          pip install -r requirements.txt

      - name: Run tests
        run: |
          pytest -v

      - name: Docker clean up
        if: always()
        run: |
          docker stop events-api-container
          docker rm events-api-container