name: Events-API CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    environment: Prod

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Docker buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_IMAGE_NAME }}:latest .

      - name: Run Docker Container
        run: |
          docker run -d -p 5000:5000 --name ${{ secrets.DOCKER_IMAGE_NAME }}-container ${{ secrets.DOCKER_IMAGE_NAME }}:latest
          sleep 5
          curl http://localhost:5000/api/health || exit 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python Dependencies
        run: |
          pip install -r requirements.txt

      - name: Run tests
        run: |
          pytest -v

      - name: Docker clean up
        if: always()
        run: |
          docker stop ${{ secrets.DOCKER_IMAGE_NAME }}-container
          docker rm ${{ secrets.DOCKER_IMAGE_NAME }}-container

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Tag your Docker Image
        run: |
          docker tag events-api:latest ${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.DOCKER_IMAGE_NAME }}:latest 
          docker tag events-api:latest ${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.DOCKER_IMAGE_NAME }}:${{ github.sha }}

      - name: Push Docker Image to DockerHub
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.DOCKER_IMAGE_NAME }}:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.DOCKER_IMAGE_NAME }}:${{ github.sha }}

      - name: Trigger Render to Redeploy
        run: |
          curl -X POST ${{ secrets.RENDER_DEPLOYMENT_HOOK }}